databaseChangeLog:
  - changeSet:
      id: 1
      author: me.me
      labels: init-load
      context: dev
      changes:
        - createTable:
            tableName: CUSTOMER
            columns:
              - column:
                  name: ID
                  type: int(11) unsigned
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: NAME
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: ACTIVE
                  type: tinyint(1) unsigned
                  defaultValue: '1'
                  constraints:
                    nullable: false
  - changeSet:
      id: 2
      author: me.me
      labels: init-load
      context: dev
      changes:
        - createTable:
            tableName: IP_STOP_LIST
            columns:
              - column:
                  name: IP
                  type: int(11) unsigned
                  constraints:
                    primaryKey: true
                    nullable: false
  - changeSet:
      id: 3
      author: me.me
      labels: init-load
      context: dev
      changes:
        - createTable:
            tableName: USER_AGENT_STOP_LIST
            columns:
              - column:
                  name: USER_AGENT
                  type: varchar(255)
                  constraints:
                    primaryKey: true
                    nullable: false
  - changeSet:
      id: 4
      author: me.me
      labels: init-load
      context: dev
      changes:
        - createTable:
            tableName: HOURLY_STATS
            columns:
              - column:
                  name: ID
                  type: int(11) unsigned
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: CUSTOMER_ID
                  type: int(11) unsigned
                  constraints:
                    nullable: false
              - column:
                  name: TIME
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: REQUEST_COUNT
                  type: bigint(20) unsigned
                  defaultValue: '0'
                  constraints:
                    nullable: false
              - column:
                  name: INVALID_COUNT
                  type: bigint(20) unsigned
                  defaultValue: '0'
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: HOURLY_STATS
            columnNames: CUSTOMER_ID,TIME
            constraintName: UNIQUE_CUSTOMER_TIME
        - createIndex:
            tableName: HOURLY_STATS
            columns:
              - column:
                  name: CUSTOMER_ID
            indexName: CUSTOMER_IDX
  - changeSet:
      id: 5
      author: me.me
      labels: init-load
      context: dev
      changes:
        - insert:
            tableName: CUSTOMER
            columns:
              - column:
                  name: ID
                  value: 1
              - column:
                  name: NAME
                  value: "Big News Media Corp"
              - column:
                  name: ACTIVE
                  value: 1
        - insert:
            tableName: CUSTOMER
            columns:
              - column:
                  name: id
                  value: 2
              - column:
                  name: NAME
                  value: "Online Mega Store"
              - column:
                  name: ACTIVE
                  value: 1
        - insert:
            tableName: CUSTOMER
            columns:
              - column:
                  name: id
                  value: 3
              - column:
                  name: NAME
                  value: "Nachoroo Delivery"
              - column:
                  name: ACTIVE
                  value: 0
        - insert:
            tableName: CUSTOMER
            columns:
              - column:
                  name: ID
                  value: 4
              - column:
                  name: NAME
                  value: "Euro Telecom Group"
              - column:
                  name: ACTIVE
                  value: 1
  - changeSet:
      id: 6
      author: me.me
      labels: init-load
      context: dev
      changes:
        - insert:
            tableName: IP_STOP_LIST
            columns:
              - column:
                  name: ip
                  value: 0
        - insert:
            tableName: IP_STOP_LIST
            columns:
              - column:
                  name: ip
                  value: 2130706433
        - insert:
            tableName: IP_STOP_LIST
            columns:
              - column:
                  name: IP
                  value: 4294967295
  - changeSet:
      id: 7
      author: me.me
      labels: init-load
      context: dev
      changes:
        - insert:
            tableName: USER_AGENT_STOP_LIST
            columns:
              - column:
                  name: USER_AGENT
                  value: "A6-Indexer"
        - insert:
            tableName: USER_AGENT_STOP_LIST
            columns:
              - column:
                  name: USER_AGENT
                  value: "Googlebot-News"
        - insert:
            tableName: USER_AGENT_STOP_LIST
            columns:
              - column:
                  name: USER_AGENT
                  value: "Googlebot"
  - changeSet:
      id: 8
      author: me.me
      labels: init-load
      context: dev
      changes:
        - createTable:
            tableName: CUSTOMER_WRONG_REQUESTS
            columns:
              - column:
                  name: REQUEST_ID
                  type: int(11) unsigned
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: CUSTOMER_ID
                  type: int(11) unsigned
                  constraints:
                    nullable: false
              - column:
                  name: REQUEST_TEXT
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: ERROR_MESSAGE_TEXT
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: TIMESTAMP
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
  - changeSet:
      id: 9
      author: me.me
      labels: init-load
      context: dev
      changes:
        - createTable:
            tableName: CUSTOMER_VALID_REQUESTS
            columns:
              - column:
                  name: REQUEST_ID
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: CUSTOMER_ID
                  type: bigint
              - column:
                  name: REMOTE_IP
                  type: bigint
              - column:
                  name: TAG_ID
                  type: int
              - column:
                  name: TIMESTAMP
                  type: bigint
              - column:
                  name: USER_ID
                  type: varchar(255)
              - column:
                  name: TS
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
            options:
              engine: InnoDB
              autoIncrement: 5
              defaultCharacterSet: utf8mb4
              defaultCollate: utf8mb4_0900_ai_ci
